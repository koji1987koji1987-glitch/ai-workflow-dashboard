<!DOCTYPE html>

<html>

<head>

  <title>

    AI Workflow Dashboard

  </title>

  <link rel="stylesheet" href="style.css">

</head>


<body>


  <h1>

    AI-Powered Engineering Workflow Dashboard

  </h1>



  <div class="stats">


    <div class="card">

      <h3>

        Developers

      </h3>

      <p>

        3

      </p>

    </div>



    <div class="card">

      <h3>

        Active Tasks

      </h3>

      <p>

        3

      </p>

    </div>



    <div class="card">

      <h3>

        Avg Performance

      </h3>

      <p>

        90

      </p>

    </div>


  </div>



  <h2>

    Developer Data

  </h2>



  <table>


    <tr>

      <th>Name</th>

      <th>Skill</th>

      <th>Workload</th>

      <th>Performance</th>

    </tr>



    <tr>

      <td>Sarah</td>

      <td>Frontend</td>

      <td>2</td>

      <td>90</td>

    </tr>



    <tr>

      <td>Mike</td>

      <td>Backend</td>

      <td>5</td>

      <td>85</td>

    </tr>



    <tr>

      <td>Emma</td>

      <td>Frontend</td>

      <td>1</td>

      <td>95</td>

    </tr>


  </table>



  <button onclick="assignTask()">

    Assign Task

  </button>



  <p id="result"></p>



  <h2>

    Performance Analytics

  </h2>



  <canvas id="performanceChart"></canvas>



  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <script src="script.js"></script>


</body>

</html>
